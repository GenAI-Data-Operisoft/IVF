AWSTemplateFormatVersion: '2010-09-09'
Description: 'IVF DEV Environment - All DynamoDB Tables'

Parameters:
  Env:
    Type: String
    Default: Dev
    Description: Environment name for resource naming

Resources:
  # ========================================
  # Main Cases Table
  # ========================================
  CasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-Cases'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Label Validation Extractions Table
  # ========================================
  LabelValidationExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-LabelValidationExtractions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Male Sample Collection Extractions Table
  # ========================================
  MaleSampleCollectionExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-MaleSampleCollectionExtractions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Oocyte Collection Extractions Table
  # ========================================
  OocyteCollectionExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-OocyteCollectionExtractions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Denudation Extractions Table
  # ========================================
  DenudationExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-DenudationExtractions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # ICSI Extractions Table
  # ========================================
  ICSIExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-ICSIExtractions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Culture Extractions Table
  # ========================================
  CultureExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-CultureExtractions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Audit Log Table
  # ========================================
  AuditLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-AuditLog'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auditId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: action
          AttributeType: S
        - AttributeName: patientMPEID
          AttributeType: S
      KeySchema:
        - AttributeName: auditId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ActionIndex
          KeySchema:
            - AttributeName: action
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PatientIndex
          KeySchema:
            - AttributeName: patientMPEID
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Validation Failures Table
  # ========================================
  ValidationFailuresTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-ValidationFailures'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: failureId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: stage
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: failed_at
          AttributeType: S
      KeySchema:
        - AttributeName: failureId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: failed_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: StageIndex
          KeySchema:
            - AttributeName: stage
              KeyType: HASH
            - AttributeName: failed_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: failed_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # Injected Oocyte Images Table
  # ========================================
  InjectedOocyteImagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'IVF-${Env}-InjectedOocyteImages'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: imageId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: imageId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

Outputs:
  CasesTableName:
    Value: !Ref CasesTable
  CasesTableArn:
    Value: !GetAtt CasesTable.Arn
  LabelValidationTableName:
    Value: !Ref LabelValidationExtractionsTable
  LabelValidationTableArn:
    Value: !GetAtt LabelValidationExtractionsTable.Arn
  LabelValidationStreamArn:
    Value: !GetAtt LabelValidationExtractionsTable.StreamArn
  MaleSampleCollectionTableName:
    Value: !Ref MaleSampleCollectionExtractionsTable
  MaleSampleCollectionTableArn:
    Value: !GetAtt MaleSampleCollectionExtractionsTable.Arn
  MaleSampleCollectionStreamArn:
    Value: !GetAtt MaleSampleCollectionExtractionsTable.StreamArn
  OocyteCollectionTableName:
    Value: !Ref OocyteCollectionExtractionsTable
  OocyteCollectionTableArn:
    Value: !GetAtt OocyteCollectionExtractionsTable.Arn
  OocyteCollectionStreamArn:
    Value: !GetAtt OocyteCollectionExtractionsTable.StreamArn
  DenudationTableName:
    Value: !Ref DenudationExtractionsTable
  DenudationTableArn:
    Value: !GetAtt DenudationExtractionsTable.Arn
  DenudationStreamArn:
    Value: !GetAtt DenudationExtractionsTable.StreamArn
  ICSITableName:
    Value: !Ref ICSIExtractionsTable
  ICSITableArn:
    Value: !GetAtt ICSIExtractionsTable.Arn
  ICSIStreamArn:
    Value: !GetAtt ICSIExtractionsTable.StreamArn
  CultureTableName:
    Value: !Ref CultureExtractionsTable
  CultureTableArn:
    Value: !GetAtt CultureExtractionsTable.Arn
  CultureStreamArn:
    Value: !GetAtt CultureExtractionsTable.StreamArn
  AuditLogTableName:
    Value: !Ref AuditLogTable
  AuditLogTableArn:
    Value: !GetAtt AuditLogTable.Arn
  AuditLogStreamArn:
    Value: !GetAtt AuditLogTable.StreamArn
  ValidationFailuresTableName:
    Value: !Ref ValidationFailuresTable
  ValidationFailuresTableArn:
    Value: !GetAtt ValidationFailuresTable.Arn
  InjectedOocyteImagesTableName:
    Value: !Ref InjectedOocyteImagesTable
  InjectedOocyteImagesTableArn:
    Value: !GetAtt InjectedOocyteImagesTable.Arn
