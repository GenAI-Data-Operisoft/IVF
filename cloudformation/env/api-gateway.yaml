      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ========================================
  # Inline Lambda: PUT /case/{sessionId}/patients
  # ========================================
  UpdatePatientDetailsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'IVF-${Env}-UpdatePatientDetails'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Ref LambdaRoleArn
      Timeout: 10
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime

          dynamodb = boto3.resource('dynamodb')
          cases_table = dynamodb.Table(os.environ['CASES_TABLE'])

          def lambda_handler(event, context):
              try:
                  session_id = event['pathParameters']['sessionId']
                  body = json.loads(event['body'])
                  male_patient = body.get('male_patient', {})
                  female_patient = body.get('female_patient', {})
                  for field in ['name', 'mpeid']:
                      if not male_patient.get(field):
                          return {'statusCode': 400, 'headers': {'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': f'Male patient {field} is required'})}
                      if not female_patient.get(field):
                          return {'statusCode': 400, 'headers': {'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': f'Female patient {field} is required'})}
                  response = cases_table.get_item(Key={'sessionId': session_id})
                  if 'Item' not in response:
                      return {'statusCode': 404, 'headers': {'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': 'Case not found'})}
                  cases_table.update_item(
                      Key={'sessionId': session_id},
                      UpdateExpression='SET male_patient = :male, female_patient = :female, updated_at = :ts',
                      ExpressionAttributeValues={
                          ':male': {'name': male_patient['name'], 'last_name': male_patient.get('last_name', ''), 'mpeid': male_patient['mpeid'], 'dob': male_patient.get('dob', '')},
                          ':female': {'name': female_patient['name'], 'last_name': female_patient.get('last_name', ''), 'mpeid': female_patient['mpeid'], 'dob': female_patient.get('dob', '')},
                          ':ts': datetime.utcnow().isoformat()
                      }
                  )
                  return {'statusCode': 200, 'headers': {'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'message': 'Patient details updated', 'sessionId': session_id})}
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'headers': {'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': str(e)})}
      Environment:
        Variables:
          CASES_TABLE: !Ref CasesTableName
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  UpdatePatientDetailsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref CasePatientsResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdatePatientDetailsFunction.Arn}/invocations'

  UpdatePatientDetailsMethodOptions:
