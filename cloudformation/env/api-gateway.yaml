      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'PUT,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ========================================
  # Inline Lambda: POST /failures/resolve
  # ========================================
  ResolveFailureFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'IVF-${Env}-ResolveFailure'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Ref LambdaRoleArn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime
          import os
          from boto3.dynamodb.conditions import Key

          dynamodb = boto3.resource('dynamodb')
          failures_table = dynamodb.Table(os.environ['FAILURES_TABLE'])
          cases_table = dynamodb.Table(os.environ['CASES_TABLE'])

          def lambda_handler(event, context):
              try:
                  body = json.loads(event['body'])
                  session_id = body['sessionId']
                  stage = body['stage']
                  resolution_category = body.get('resolution_category', '')
                  resolution_notes = body.get('resolution_notes', '')
                  resolved_by_user = body.get('resolved_by_user', 'system')
                  response = failures_table.query(IndexName='SessionIdIndex', KeyConditionExpression=Key('sessionId').eq(session_id))
                  failures = [f for f in response.get('Items', []) if f.get('stage') == stage and f.get('status') == 'active']
                  if not failures:
                      return {'statusCode': 404, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'message': 'No active failure found'})}
                  failure = sorted(failures, key=lambda x: x['failed_at'], reverse=True)[0]
                  failure_id = failure['failureId']
                  resolved_at = datetime.utcnow().isoformat()
                  failed_time = datetime.fromisoformat(failure['failed_at'].replace('Z', '+00:00'))
                  resolution_time_minutes = int((datetime.fromisoformat(resolved_at) - failed_time).total_seconds() / 60)
                  failures_table.update_item(
                      Key={'failureId': failure_id},
                      UpdateExpression='SET #status = :status, resolved_at = :resolved_at, resolution_time_minutes = :rt, resolution_category = :cat, resolution_notes = :notes, resolved_by_user = :user, updated_at = :ua',
                      ExpressionAttributeNames={'#status': 'status'},
                      ExpressionAttributeValues={':status': 'resolved', ':resolved_at': resolved_at, ':rt': resolution_time_minutes, ':cat': resolution_category, ':notes': resolution_notes, ':user': resolved_by_user, ':ua': resolved_at}
                  )
                  return {'statusCode': 200, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'message': 'Failure resolved', 'failureId': failure_id, 'resolution_time_minutes': resolution_time_minutes})}
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': str(e)})}
      Environment:
        Variables:
          FAILURES_TABLE: !Ref ValidationFailuresTableName
          CASES_TABLE: !Ref CasesTableName
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  ResolveFailureMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref FailuresResolveResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
