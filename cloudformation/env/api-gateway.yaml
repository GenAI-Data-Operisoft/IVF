  # ========================================
  # Inline Lambda: GET /metrics
  # ========================================
  GetMetricsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'IVF-${Env}-GetMetrics'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Ref LambdaRoleArn
      Timeout: 30
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime, timedelta
          from collections import defaultdict
          import os

          dynamodb = boto3.resource('dynamodb')
          failures_table = dynamodb.Table(os.environ['FAILURES_TABLE'])

          STAGE_NAMES = {'label_validation': 'Label Validation', 'oocyte_collection': 'Oocyte Collection', 'denudation': 'Denudation', 'male_sample_collection': 'Male Sample Collection', 'icsi': 'ICSI', 'culture': 'Culture'}

          def lambda_handler(event, context):
              try:
                  params = event.get('queryStringParameters') or {}
                  stage_filter = params.get('stage', 'all')
                  status_filter = params.get('status', 'all')
                  date_range = params.get('dateRange', '30')
                  custom_start = params.get('customStartDate')
                  custom_end = params.get('customEndDate')
                  response = failures_table.scan()
                  all_failures = response.get('Items', [])
                  while 'LastEvaluatedKey' in response:
                      response = failures_table.scan(ExclusiveStartKey=response['LastEvaluatedKey'])
                      all_failures.extend(response.get('Items', []))
                  filtered = apply_filters(all_failures, stage_filter, status_filter, date_range, custom_start, custom_end)
                  metrics = calculate_metrics(filtered)
                  return {'statusCode': 200, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps(metrics, default=str)}
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': str(e)})}

          def apply_filters(failures, stage_filter, status_filter, date_range, custom_start=None, custom_end=None):
              filtered = failures
              if stage_filter != 'all':
                  filtered = [f for f in filtered if f.get('stage') == stage_filter]
              if status_filter != 'all':
                  filtered = [f for f in filtered if f.get('status') == status_filter]
              if date_range == 'custom' and custom_start and custom_end:
                  start_date = datetime.fromisoformat(custom_start.replace('Z', '+00:00'))
                  end_date = datetime.fromisoformat(custom_end.replace('Z', '+00:00'))
                  filtered = [f for f in filtered if start_date <= datetime.fromisoformat(f.get('failed_at', '').replace('Z', '+00:00')) <= end_date]
              elif date_range != 'all':
                  days = float(date_range)
                  cutoff = datetime.utcnow() - timedelta(days=days)
                  filtered = [f for f in filtered if datetime.fromisoformat(f.get('failed_at', '').replace('Z', '+00:00')) > cutoff]
              return filtered

          def calculate_metrics(filtered):
              total = len(filtered)
              active = len([f for f in filtered if f.get('status') == 'active'])
              resolved = len([f for f in filtered if f.get('status') == 'resolved'])
              overview = {'total': total, 'active': active, 'resolved': resolved, 'failureRate': round((total / max(total * 10, 1)) * 100, 1) if total > 0 else 0}
              by_stage = defaultdict(int)
              for f in filtered:
                  by_stage[f.get('stage', 'unknown')] += 1
              by_stage_list = [{'stage': STAGE_NAMES.get(s, s), 'count': c} for s, c in sorted(by_stage.items(), key=lambda x: x[1], reverse=True)]
              by_reason = defaultdict(int)
              for f in filtered:
                  by_reason[f.get('primary_mismatch_reason', 'Unknown')] += 1
              total_reasons = sum(by_reason.values())
              by_reason_list = [{'reason': r, 'count': c, 'percentage': round((c / total_reasons) * 100, 1) if total_reasons > 0 else 0} for r, c in sorted(by_reason.items(), key=lambda x: x[1], reverse=True)]
              failures_list = sorted(filtered, key=lambda x: x.get('failed_at', ''), reverse=True)[:50]
              return {'overview': overview, 'byStage': by_stage_list, 'byReason': by_reason_list, 'failures': failures_list}
      Environment:
        Variables:
          FAILURES_TABLE: !Ref ValidationFailuresTableName
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

