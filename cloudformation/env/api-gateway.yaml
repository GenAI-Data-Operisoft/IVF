AWSTemplateFormatVersion: '2010-09-09'
Description: 'IVF DEV Environment - API Gateway REST API with Inline Lambda Functions'

Parameters:
  Env:
    Type: String
    Default: Dev
    Description: Environment name for resource naming
  ApiName:
    Type: String
    Default: IVF-Dev-API
    Description: Name of the API Gateway
  LambdaRoleArn:
    Type: String
    Description: ARN of the Lambda execution role
  RegistrationHandlerArn:
    Type: String
    Description: ARN of the Registration Handler Lambda
  PresignedUrlGeneratorArn:
    Type: String
    Description: ARN of the Presigned URL Generator Lambda
  ListSessionsArn:
    Type: String
    Description: ARN of the List Sessions Lambda
  CasesTableName:
    Type: String
    Description: Name of the Cases DynamoDB table
  LabelValidationTableName:
    Type: String
    Description: Name of the Label Validation table
  MaleSampleCollectionTableName:
    Type: String
    Description: Name of the Male Sample Collection table
  OocyteCollectionTableName:
    Type: String
    Description: Name of the Oocyte Collection table
  DenudationTableName:
    Type: String
    Description: Name of the Denudation table
  ICSITableName:
    Type: String
    Description: Name of the ICSI table
  CultureTableName:
    Type: String
    Description: Name of the Culture table
  ValidationFailuresTableName:
    Type: String
    Description: Name of the Validation Failures table

Resources:
  # ========================================
  # API Gateway REST API
  # ========================================
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: !Sub 'IVF Witness Capture DEV API (${Env})'
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  # ========================================
  # API Gateway Resources
  # ========================================
  RegisterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: register

  PresignedUrlResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: presigned-url

  CaseResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: case

  CaseSessionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CaseResource
      PathPart: '{sessionId}'

  CaseStageResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CaseSessionResource
      PathPart: stage

  CaseStageDetailResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CaseStageResource
      PathPart: '{stage}'

  CasePatientsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CaseSessionResource
      PathPart: patients

  ModelsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: models

  FailuresResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: failures

  FailuresResolveResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref FailuresResource
      PathPart: resolve

  MetricsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: metrics

  MetricsExportResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref MetricsResource
      PathPart: export

  SessionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: sessions

  # ========================================
  # POST /register
  # ========================================
  RegisterMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RegisterResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RegistrationHandlerArn}/invocations'

  RegisterMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RegisterResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ========================================
  # POST /presigned-url
  # ========================================
  PresignedUrlMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref PresignedUrlResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PresignedUrlGeneratorArn}/invocations'

  PresignedUrlMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref PresignedUrlResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ========================================
  # GET /sessions
  # ========================================
  GetSessionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref SessionsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListSessionsArn}/invocations'

  GetSessionsMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref SessionsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ========================================
  # Inline Lambda: GET /case/{sessionId}
  # ========================================
  GetCaseFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'IVF-${Env}-GetCase'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Ref LambdaRoleArn
      Timeout: 10
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          dynamodb = boto3.resource('dynamodb')
          cases_table = dynamodb.Table(os.environ['CASES_TABLE'])

          def lambda_handler(event, context):
              try:
                  session_id = event['pathParameters']['sessionId']
                  response = cases_table.get_item(Key={'sessionId': session_id})
                  if 'Item' not in response:
                      return {
                          'statusCode': 404,
                          'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                          'body': json.dumps({'error': 'Case not found'})
                      }
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': json.dumps(response['Item'], default=str)
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': json.dumps({'error': 'Internal server error'})
                  }
      Environment:
        Variables:
          CASES_TABLE: !Ref CasesTableName
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  GetCaseMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref CaseSessionResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCaseFunction.Arn}/invocations'

  GetCaseMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref CaseSessionResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ========================================
  # Inline Lambda: GET /case/{sessionId}/stage/{stage}
  # ========================================
  GetStageFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'IVF-${Env}-GetStage'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Ref LambdaRoleArn
      Timeout: 10
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          dynamodb = boto3.resource('dynamodb')

          STAGE_TABLE_MAP = {
              'label_validation': os.environ.get('LABEL_VALIDATION_TABLE'),
              'male_sample_collection': os.environ.get('MALE_SAMPLE_TABLE'),
              'oocyte_collection': os.environ.get('OOCYTE_TABLE'),
              'denudation': os.environ.get('DENUDATION_TABLE'),
              'icsi': os.environ.get('ICSI_TABLE'),
              'culture': os.environ.get('CULTURE_TABLE')
          }

          def lambda_handler(event, context):
              try:
                  session_id = event['pathParameters']['sessionId']
                  stage = event['pathParameters']['stage']
                  if stage not in STAGE_TABLE_MAP:
                      return {
                          'statusCode': 400,
                          'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                          'body': json.dumps({'error': 'Invalid stage'})
                      }
                  table = dynamodb.Table(STAGE_TABLE_MAP[stage])
                  response = table.query(
                      IndexName='SessionIdIndex',
                      KeyConditionExpression='sessionId = :sid',
                      ExpressionAttributeValues={':sid': session_id}
                  )
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': json.dumps({'stage': stage, 'sessionId': session_id, 'extractions': response['Items']}, default=str)
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': json.dumps({'error': 'Internal server error'})
                  }
      Environment:
        Variables:
          LABEL_VALIDATION_TABLE: !Ref LabelValidationTableName
          MALE_SAMPLE_TABLE: !Ref MaleSampleCollectionTableName
          OOCYTE_TABLE: !Ref OocyteCollectionTableName
          DENUDATION_TABLE: !Ref DenudationTableName
          ICSI_TABLE: !Ref ICSITableName
          CULTURE_TABLE: !Ref CultureTableName
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

  GetStageMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref CaseStageDetailResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetStageFunction.Arn}/invocations'

  GetStageMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref CaseStageDetailResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

