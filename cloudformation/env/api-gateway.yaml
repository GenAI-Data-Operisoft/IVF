  # ========================================
  # Inline Lambda: GET /metrics/export
  # ========================================
  ExportMetricsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'IVF-${Env}-ExportMetrics'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Ref LambdaRoleArn
      Timeout: 30
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime, timedelta
          import os
          import csv
          from io import StringIO

          dynamodb = boto3.resource('dynamodb')
          failures_table = dynamodb.Table(os.environ['FAILURES_TABLE'])

          def lambda_handler(event, context):
              try:
                  params = event.get('queryStringParameters') or {}
                  stage_filter = params.get('stage', 'all')
                  status_filter = params.get('status', 'all')
                  date_range = params.get('dateRange', '30')
                  custom_start = params.get('customStartDate')
                  custom_end = params.get('customEndDate')
                  response = failures_table.scan()
                  all_failures = response.get('Items', [])
                  while 'LastEvaluatedKey' in response:
                      response = failures_table.scan(ExclusiveStartKey=response['LastEvaluatedKey'])
                      all_failures.extend(response.get('Items', []))
                  filtered = apply_filters(all_failures, stage_filter, status_filter, date_range, custom_start, custom_end)
                  csv_data = generate_csv(filtered)
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'text/csv', 'Access-Control-Allow-Origin': '*', 'Content-Disposition': f'attachment; filename="validation-failures-{datetime.utcnow().strftime("%Y%m%d")}.csv"'},
                      'body': csv_data
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps({'error': str(e)})}

          def apply_filters(failures, stage_filter, status_filter, date_range, custom_start=None, custom_end=None):
              filtered = failures
              if stage_filter != 'all':
                  filtered = [f for f in filtered if f.get('stage') == stage_filter]
              if status_filter != 'all':
                  filtered = [f for f in filtered if f.get('status') == status_filter]
              if date_range == 'custom' and custom_start and custom_end:
                  start_date = datetime.fromisoformat(custom_start.replace('Z', '+00:00'))
                  end_date = datetime.fromisoformat(custom_end.replace('Z', '+00:00'))
                  filtered = [f for f in filtered if start_date <= datetime.fromisoformat(f.get('failed_at', '').replace('Z', '+00:00')) <= end_date]
              elif date_range != 'all':
                  days = float(date_range)
                  cutoff = datetime.utcnow() - timedelta(days=days)
                  filtered = [f for f in filtered if datetime.fromisoformat(f.get('failed_at', '').replace('Z', '+00:00')) > cutoff]
              return filtered

          def generate_csv(failures):
              output = StringIO()
              writer = csv.writer(output)
              writer.writerow(['Failure ID', 'Session ID', 'Stage', 'Failed At', 'Status', 'Primary Mismatch Reason', 'Resolution Category', 'Resolution Notes', 'Resolved At', 'Resolution Time (min)', 'Resolved By'])
              for f in sorted(failures, key=lambda x: x.get('failed_at', ''), reverse=True):
                  writer.writerow([f.get('failureId', ''), f.get('sessionId', ''), f.get('stage', ''), f.get('failed_at', ''), f.get('status', ''), f.get('primary_mismatch_reason', ''), f.get('resolution_category', ''), f.get('resolution_notes', ''), f.get('resolved_at', ''), f.get('resolution_time_minutes', ''), f.get('resolved_by_user', '')])
              return output.getvalue()
      Environment:
        Variables:
          FAILURES_TABLE: !Ref ValidationFailuresTableName
      Tags:
        - Key: Application
          Value: IVF-Witness-Capture
        - Key: Environment
          Value: Development

