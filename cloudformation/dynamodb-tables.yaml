    Properties:
      TableName: IVF-OocyteCollectionExtractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: FMS-IVF-WitnessCapture
        - Key: Environment
          Value: Development

  # ========================================
  # Denudation Extractions Table
  # ========================================
  DenudationExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: IVF-DenudationExtractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: FMS-IVF-WitnessCapture
        - Key: Environment
          Value: Development

  # ========================================
  # ICSI Extractions Table
  # ========================================
  ICSIExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: IVF-ICSIExtractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: FMS-IVF-WitnessCapture
        - Key: Environment
          Value: Development

  # ========================================
  # Culture Extractions Table
  # ========================================
  CultureExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: IVF-CultureExtractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: FMS-IVF-WitnessCapture
