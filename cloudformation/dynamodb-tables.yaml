AWSTemplateFormatVersion: '2010-09-09'
Description: 'IVF Witness Capture - DynamoDB Tables'

Resources:
  # ========================================
  # Main Cases Table
  # ========================================
  IVFCasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: IVF-Cases
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: FMS-IVF-WitnessCapture
        - Key: Environment
          Value: Development

  # ========================================
  # Label Validation Extractions Table
  # ========================================
  LabelValidationExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: IVF-LabelValidationExtractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: FMS-IVF-WitnessCapture
        - Key: Environment
          Value: Development

  # ========================================
  # Male Sample Collection Extractions Table
  # ========================================
  MaleSampleCollectionExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: IVF-MaleSampleCollectionExtractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: extractionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: extractionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: FMS-IVF-WitnessCapture
        - Key: Environment
          Value: Development

  # ========================================
  # Oocyte Collection Extractions Table
  # ========================================
